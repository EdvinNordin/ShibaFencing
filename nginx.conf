server {
    listen 80;
    root /var/www/html;
    index index.html;

    # Reverse-proxy WebSocket connections to the internal .NET server.
    # This allows a single exposed port (80/443) to serve both the static
    # client and the WebSocket backend – required for platforms like shiper.app.
    location /ws {
        proxy_pass http://127.0.0.1:8181;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
