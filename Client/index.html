<!DOCTYPE html>

  <head>
    <meta charset="utf-8" />
    <title>Web Fighting</title>
    <link rel="icon" href="" />

  </head>

  <body>
    <div id="hpContainer">
      <div id="hp"><span id="currentHP">100%</span></div>
    </div>

    <div id="rotateZone"></div>

    <div id="mobileControls">
      <div id="joystickZone"></div>
      <div id="swingButton"><img src="swing.png" /></div>
    </div>

    <img src="fullscreen.svg" id="fullscreenButton" />

    <div id="startScreen">
      <h1>Welcome to Shiba Fencing</h1>
      <p>Enter your name to start playing!</p>
      <form id="startGameForm">
        <div id="inputContainer">
          <input
            type="text"
            id="playerNameInput"
            placeholder="Enter your name"
            required
          />
          <button type="submit" id="startGameButton">Start Game</button>
        </div>
      </form>
    </div>
